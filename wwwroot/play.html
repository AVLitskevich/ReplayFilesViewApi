<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skillcade Games Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-header: #1e293b;
            --primary: #6366f1;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --transition: all 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--bg-header);
            padding: 0 1.5rem;
            height: 60px;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition);
        }

        .back-link:hover {
            color: var(--text-main);
            transform: translateX(-2px);
        }

        .divider {
            width: 1px;
            height: 24px;
            background-color: rgba(255, 255, 255, 0.1);
        }

        #project-name {
            color: var(--text-main);
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        #game-frame,
        #unity-canvas {
            flex: 1;
            width: 100%;
            border: none;
            display: none;
        }

        #game-frame.visible,
        #unity-canvas.visible {
            display: block;
        }

        #loading {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7f8c8d;
            font-size: 16px;
        }

        #error {
            flex: 1;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            color: #e74c3c;
        }

        #error a {
            color: #3498db;
            text-decoration: none;
            font-size: 14px;
        }

        #error a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="back-link">Back to projects</a>
        <div class="divider"></div>
        <span id="project-name">Loading...</span>
    </header>

    <div id="loading">Loading game...</div>
    <div id="error">
        <span id="error-message">Failed to load game</span>
        <a href="/">← Back to projects</a>
    </div>
    <iframe id="game-frame"
        allow="fullscreen; pointer-lock"
        allowfullscreen>
    </iframe>
    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <script>
        const pathParts = window.location.pathname.split('/').filter(Boolean);
        const slug = pathParts[0];

        async function getBuildVersion(url) {
            try {
                const resp = await fetch(url, { method: 'HEAD', cache: 'no-store' });
                const version = resp.headers.get('Last-Modified') || resp.headers.get('ETag');
                return '?v=' + encodeURIComponent(version || Date.now());
            } catch {
                return '?v=' + Date.now();
            }
        }

        async function loadUnityGame(project) {
            const gameUrl = project.clientBuildUrl || project.webGLUrl;
            const gameDir = gameUrl.substring(0, gameUrl.lastIndexOf('/'));
            const buildBase = gameDir + '/Build';
            const loaderUrl = `${buildBase}/${project.unityProductName}.loader.js`;

            console.log('[Unity] buildBase:', buildBase);
            const v = await getBuildVersion(loaderUrl);
            console.log('[Unity] version:', v);

            await new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = loaderUrl + v;
                script.onload = () => { console.log('[Unity] loader.js loaded'); resolve(); };
                script.onerror = () => reject(new Error('Failed to load Unity loader: ' + script.src));
                document.head.appendChild(script);
            });

            if (typeof createUnityInstance === 'undefined') {
                throw new Error('createUnityInstance is not defined after loader loaded');
            }

            const canvas = document.getElementById('unity-canvas');
            canvas.classList.add('visible');
            document.getElementById('loading').style.display = 'none';

            console.log('[Unity] calling createUnityInstance...');
            await createUnityInstance(canvas, {
                dataUrl: `${buildBase}/${project.unityProductName}.data.gz${v}`,
                frameworkUrl: `${buildBase}/${project.unityProductName}.framework.js.gz${v}`,
                codeUrl: `${buildBase}/${project.unityProductName}.wasm.gz${v}`,
                streamingAssetsUrl: gameDir + '/StreamingAssets',
                print: (msg) => console.log(msg),
                printErr: (msg) => console.error(msg),
            });
            console.log('[Unity] createUnityInstance resolved');
        }

        async function loadGame() {
            if (!slug) {
                showError('Could not determine project from URL');
                return;
            }

            try {
                const response = await fetch(`/api/projects/${encodeURIComponent(slug)}`);

                if (!response.ok) {
                    if (response.status === 404) throw new Error('Project not found');
                    throw new Error(`Failed to load: ${response.status} ${response.statusText}`);
                }

                const project = await response.json();

                document.title = project.name;
                document.getElementById('project-name').textContent = project.name;

                const gameUrl = project.clientBuildUrl || project.webGLUrl;
                if (!gameUrl) {
                    showError('No game URL configured for this project');
                    return;
                }

                console.log('[Game] project:', project.slug, '| unityProductName:', project.unityProductName);

                if (project.unityProductName) {
                    await loadUnityGame(project);
                } else {
                    const frame = document.getElementById('game-frame');
                    frame.src = gameUrl + await getBuildVersion(gameUrl);
                    document.getElementById('loading').style.display = 'none';
                    frame.classList.add('visible');
                }
            } catch (error) {
                showError(error.message);
                console.error('Error loading game:', error);
            }
        }

        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error-message').textContent = message;
            document.getElementById('error').style.display = 'flex';
        }

        document.addEventListener('DOMContentLoaded', loadGame);
    </script>
    <script src="/nav.js"></script>
</body>
</html>
