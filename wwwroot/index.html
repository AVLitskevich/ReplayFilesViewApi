<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKILLCADE // REPLAY HUB</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "outline": "#72757d",
            "on-surface-variant": "#a8abb3",
            "on-surface": "#f1f3fc",
            "surface-tint": "#9aa8ff",
            "on-secondary-fixed-variant": "#6139a3",
            "primary-container": "#8c9bf3",
            "primary-fixed": "#96a5ff",
            "secondary-fixed-dim": "#d2b7ff",
            "on-secondary": "#330070",
            "background": "#0a0e14",
            "primary": "#9aa8ff",
            "on-primary-container": "#00156d",
            "primary-fixed-dim": "#8998f0",
            "on-background": "#f1f3fc",
            "tertiary-fixed": "#58e7fb",
            "surface-container-highest": "#20262f",
            "on-primary-fixed-variant": "#1b2c7f",
            "tertiary-container": "#58e7fb",
            "surface": "#0a0e14",
            "secondary-dim": "#b189f8",
            "surface-variant": "#20262f",
            "outline-variant": "#44484f",
            "on-error": "#490013",
            "on-error-container": "#ffb2b9",
            "surface-bright": "#262c36",
            "surface-container": "#151a21",
            "tertiary": "#98f0ff",
            "on-secondary-fixed": "#431585",
            "on-tertiary-container": "#00515b",
            "on-tertiary-fixed-variant": "#005b66",
            "on-tertiary-fixed": "#003c44",
            "surface-container-lowest": "#000000",
            "inverse-surface": "#f8f9ff",
            "tertiary-fixed-dim": "#45d8ed",
            "error-container": "#a70138",
            "on-primary": "#122479",
            "error": "#ff6e84",
            "surface-container-high": "#1b2028",
            "inverse-on-surface": "#51555c",
            "primary-dim": "#8998f0",
            "secondary-fixed": "#ddc8ff",
            "secondary": "#b78efe",
            "on-tertiary": "#005b65",
            "error-dim": "#d73357",
            "on-secondary-container": "#dcc7ff",
            "surface-dim": "#0a0e14",
            "secondary-container": "#572e99",
            "on-primary-fixed": "#00083f",
            "surface-container-low": "#0f141a",
            "tertiary-dim": "#45d8ed",
            "inverse-primary": "#4958ac"
          },
          fontFamily: {
            "headline": ["Space Grotesk"],
            "body": ["Manrope"],
            "label": ["Manrope"]
          },
          borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
        },
      },
    }
</script>
<style>
    body {
      background-color: #0a0e14;
      font-family: 'Manrope', sans-serif;
      color: #f1f3fc;
    }
    .hex-grid {
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l25.98 15v30L30 60 4.02 45V15z' fill-rule='evenodd' stroke='%2320262f' stroke-width='1' fill='none' opacity='0.2'/%3E%3C/svg%3E");
    }
    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined' !important;
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }
    .loader {
      border: 3px solid rgba(154, 168, 255, 0.1);
      border-top-color: #9aa8ff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
</style>
</head>
<body class="bg-background text-on-background min-h-screen relative overflow-x-hidden">
    <!-- Hexagonal Background Texture -->
    <div class="fixed inset-0 hex-grid pointer-events-none opacity-40"></div>

    <main class="flex-1 flex flex-col min-h-screen relative z-10">
        <!-- TopAppBar -->
        <header class="w-full h-24 flex items-center px-8 md:px-16 z-20">
            <div class="flex items-center gap-4 mt-6">
                <span class="material-symbols-outlined text-indigo-400" style="font-variation-settings: 'FILL' 1;">hexagon</span>
                <h2 class="text-2xl font-black text-white font-['Space_Grotesk'] uppercase tracking-[0.2em]">SKILLCADE HUB</h2>
            </div>
        </header>

        <!-- Content Canvas -->
        <div class="px-8 mt-16 md:px-16 pb-20 flex-1 flex flex-col w-full max-w-7xl mx-auto">
            
            <section class="mb-12">
                <h1 class="text-4xl font-headline font-bold text-on-surface">Available Modules</h1>
            </section>

            <div id="error" class="hidden bg-error-container/20 border border-error-dim/20 text-error-dim p-4 rounded-xl mb-8 text-sm font-headline tracking-wide uppercase"></div>

            <div id="loading" class="flex flex-col items-center justify-center py-20 text-on-surface-variant">
                <div class="loader mb-4"></div>
                <p class="font-headline tracking-widest uppercase text-xs">Scanning Matrix Projects...</p>
            </div>

            <div id="empty-message" class="hidden text-center py-20 text-on-surface-variant text-sm font-headline tracking-widest uppercase">
                No active projects deployed.
            </div>

            <div id="projects-grid" class="hidden grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </main>

    <script>
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
        }

        function hideLoading() {
            document.getElementById('loading').classList.add('hidden');
        }

        async function loadProjects() {
            try {
                const response = await fetch('/api/projects');

                if (!response.ok) {
                    throw new Error(`Connection error: ${response.status}`);
                }

                const data = await response.json();
                hideLoading();

                if (!data.projects || data.projects.length === 0) {
                    document.getElementById('empty-message').classList.remove('hidden');
                    return;
                }

                displayProjects(data.projects);
            } catch (error) {
                hideLoading();
                showError('Failed to synchronize array: ' + error.message);
                console.error('API Error:', error);
            }
        }

        function displayProjects(projects) {
            const grid = document.getElementById('projects-grid');
            grid.innerHTML = '';

            projects.forEach(project => {
                const playFragment = project.webGLUrl 
                    ? `<a href="/${encodeURIComponent(project.slug)}/play" class="flex-1 min-w-[30%] px-4 py-2 rounded-lg bg-primary/10 border border-primary/30 text-primary font-semibold text-xs hover:bg-primary/20 hover:border-primary/50 transition-colors uppercase tracking-wider text-center flex items-center justify-center gap-1"><span class="material-symbols-outlined text-[16px]">play_arrow</span> Launch</a>` 
                    : '';

                const viewerFragment = project.replayViewerUrl 
                    ? `<a href="/${encodeURIComponent(project.slug)}/viewer" class="flex-1 min-w-[30%] px-4 py-2 rounded-lg bg-secondary/10 border border-secondary/30 text-secondary font-semibold text-xs hover:bg-secondary/20 hover:border-secondary/50 transition-colors uppercase tracking-wider text-center flex items-center justify-center gap-1"><span class="material-symbols-outlined text-[16px]">visibility</span> Viewer</a>` 
                    : '';

                const replaysFragment = `<a href="/${encodeURIComponent(project.slug)}/replays" class="flex-1 min-w-[30%] px-4 py-2 rounded-lg bg-tertiary/10 border border-tertiary/30 text-tertiary font-semibold text-xs hover:bg-tertiary/20 hover:border-tertiary/50 transition-colors uppercase tracking-wider text-center flex items-center justify-center gap-1"><span class="material-symbols-outlined text-[16px]">library_books</span> Replays</a>`;

                grid.innerHTML += `
                <div class="bg-surface-container-low rounded-xl p-6 border border-transparent hover:border-indigo-500/30 transition-all group relative flex flex-col overflow-hidden">
                    <div class="absolute inset-0 bg-gradient-to-br from-indigo-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <div class="flex justify-between items-start mb-4 relative z-10 w-full">
                        <span class="material-symbols-outlined text-indigo-400 bg-indigo-500/10 p-2 rounded-lg">dns</span>
                    </div>
                    <h3 class="text-2xl font-headline font-bold text-on-surface mb-2 relative z-10">${project.name}</h3>
                    <p class="text-on-surface-variant text-sm tracking-wide mb-8 relative z-10 flex-1 line-clamp-2">${project.description || 'No description provided.'}</p>
                    <div class="flex flex-wrap gap-3 relative z-10 mt-auto pt-4 border-t border-outline-variant/10">
                        ${playFragment}
                        ${viewerFragment}
                        ${replaysFragment}
                    </div>
                </div>
                `;
            });

            grid.classList.remove('hidden');
            grid.classList.add('grid');
        }

        document.addEventListener('DOMContentLoaded', loadProjects);
    </script>
    <script src="/nav.js"></script>
</body>
</html>
