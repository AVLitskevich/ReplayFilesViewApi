<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects Dashboard — Replay Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-card-hover: #334155;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-green: #22c55e;
            --accent-purple: #a855f7;
            --accent-blue: #3b82f6;
            --radius: 12px;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.5;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5rem 0;
            color: var(--text-muted);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(99, 102, 241, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #error {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 1rem;
            border-radius: var(--radius);
            margin-bottom: 2rem;
            display: none;
        }

        #empty-message {
            text-align: center;
            padding: 5rem 0;
            color: var(--text-muted);
            font-size: 1.125rem;
            display: none;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
            display: none;
        }

        .projects-grid.visible {
            display: grid;
        }

        .project-card {
            background-color: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius);
            padding: 1.75rem;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .project-card:hover {
            transform: translateY(-4px);
            background-color: var(--bg-card-hover);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
        }

        .project-card h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--text-main);
        }

        .project-card p {
            color: var(--text-muted);
            font-size: 0.9375rem;
            margin-bottom: 2rem;
            flex-grow: 1;
            line-height: 1.6;
        }

        .project-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 0.75rem;
        }

        .btn {
            padding: 0.625rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            text-align: center;
        }

        .btn-play {
            background-color: var(--accent-green);
            color: #064e3b;
        }

        .btn-play:hover {
            background-color: #16a34a;
            transform: scale(1.02);
        }

        .btn-replays {
            background-color: var(--accent-blue);
            color: #eff6ff;
        }

        .btn-replays:hover {
            background-color: #2563eb;
            transform: scale(1.02);
        }

        .btn-viewer {
            background-color: var(--accent-purple);
            color: #faf5ff;
        }

        .btn-viewer:hover {
            background-color: #9333ea;
            transform: scale(1.02);
        }

        @media (max-width: 640px) {
            h1 { font-size: 1.5rem; }
            .projects-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Replay Hub</h1>
        </header>

        <div id="error"></div>

        <div id="loading">
            <div class="spinner"></div>
            <p>Scanning projects...</p>
        </div>

        <div id="empty-message">No projects found in the workspace</div>

        <div id="projects-grid" class="projects-grid"></div>
    </div>

    <script>
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        async function loadProjects() {
            try {
                const response = await fetch('/api/projects');

                if (!response.ok) {
                    throw new Error(`Connection error: ${response.status}`);
                }

                const data = await response.json();
                hideLoading();

                if (!data.projects || data.projects.length === 0) {
                    document.getElementById('empty-message').style.display = 'block';
                    return;
                }

                displayProjects(data.projects);
            } catch (error) {
                hideLoading();
                showError('Failed to synchronize: ' + error.message);
                console.error('API Error:', error);
            }
        }

        function displayProjects(projects) {
            const grid = document.getElementById('projects-grid');
            grid.innerHTML = '';

            projects.forEach(project => {
                const card = document.createElement('div');
                card.className = 'project-card';

                const title = document.createElement('h2');
                title.textContent = project.name;

                const desc = document.createElement('p');
                desc.textContent = project.description || 'No description provided for this project.';

                const actions = document.createElement('div');
                actions.className = 'project-actions';

                if (project.webGLUrl) {
                    const playLink = document.createElement('a');
                    playLink.href = `/${encodeURIComponent(project.slug)}/play`;
                    playLink.className = 'btn btn-play';
                    playLink.textContent = 'Launch';
                    actions.appendChild(playLink);
                }

                if (project.replayViewerUrl) {
                    const viewerLink = document.createElement('a');
                    viewerLink.href = `/${encodeURIComponent(project.slug)}/viewer`;
                    viewerLink.className = 'btn btn-viewer';
                    viewerLink.textContent = 'Viewer';
                    actions.appendChild(viewerLink);
                }

                const replaysLink = document.createElement('a');
                replaysLink.href = `/${encodeURIComponent(project.slug)}/replays`;
                replaysLink.className = 'btn btn-replays';
                replaysLink.textContent = 'Replays';
                actions.appendChild(replaysLink);

                card.appendChild(title);
                card.appendChild(desc);
                card.appendChild(actions);
                grid.appendChild(card);
            });

            grid.classList.add('visible');
        }

        document.addEventListener('DOMContentLoaded', loadProjects);
    </script>
</body>
</html>
