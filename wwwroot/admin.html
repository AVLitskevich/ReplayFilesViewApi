<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Skillcade Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Manrope:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --background: #0a0e14;
            --surface: #0f141a;
            --surface-card: #1b2028;
            --primary: #9aa8ff;
            --secondary: #b78efe;
            --tertiary: #98f0ff;
            --text: #f1f3fc;
            --text-dim: #a8abb3;
            --error: #ff6e84;
            --success: #00e676;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Manrope', sans-serif; background: var(--background); color: var(--text); overflow: hidden; }

        /* Layout Structure */
        .app-container { display: flex; height: 100vh; }
        .sidebar { width: var(--sidebar-width); background: rgba(15, 20, 26, 0.8); backdrop-filter: blur(20px); border-right: 1px solid rgba(255, 255, 255, 0.05); display: flex; flex-direction: column; padding: 32px 20px; }
        .main-content { flex: 1; overflow-y: auto; padding: 40px; position: relative; }

        /* Sidebar Elements */
        .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 48px; }
        .brand .hex-logo { width: 36px; height: 36px; background: linear-gradient(135deg, var(--secondary), var(--primary)); clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); display: flex; align-items: center; justify-content: center; font-family: 'Space Grotesk', sans-serif; font-weight: 700; color: #0a0e14; }
        .brand span { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 500; }

        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: var(--text-dim); text-decoration: none; margin-bottom: 8px; transition: all 0.3s; }
        .nav-link.active { background: rgba(154, 168, 255, 0.1); color: var(--primary); }
        .nav-link:hover:not(.active) { color: var(--text); background: rgba(255, 255, 255, 0.05); }

        /* Dashboard Header */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        h1 { font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 500; }
        .btn { padding: 10px 20px; border-radius: 10px; font-weight: 600; font-size: 14px; cursor: pointer; border: none; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: linear-gradient(90deg, var(--secondary), var(--primary)); color: #0a0e14; }
        .btn-secondary { background: rgba(255, 255, 255, 0.05); color: var(--text); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* Game Cards Grid */
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; }
        .game-card { background: var(--surface-card); border-radius: 20px; padding: 24px; border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s; position: relative; overflow: hidden; }
        .game-card:hover { border-color: var(--primary); }
        .game-card .status-badge { position: absolute; top: 20px; right: 20px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--tertiary); background: rgba(152, 240, 255, 0.1); padding: 4px 10px; border-radius: 20px; }
        .game-card h3 { font-family: 'Space Grotesk', sans-serif; margin-bottom: 8px; font-size: 20px; }
        .game-card p { font-size: 13px; color: var(--text-dim); line-height: 1.5; margin-bottom: 20px; }
        .game-card .card-footer { display: flex; gap: 10px; border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 20px; }
        .btn-sm { padding: 8px 14px; font-size: 12px; border-radius: 8px; }

        /* Log Viewer Console */
        .log-overlay { position: fixed; bottom: 40px; right: 40px; width: 600px; height: 400px; background: #000; border-radius: 16px; border: 1px solid var(--primary); z-index: 1000; display: none; flex-direction: column; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
        .log-header { padding: 12px 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-family: 'Space Grotesk', sans-serif; color: var(--primary); }
        .log-content { flex: 1; overflow-y: auto; padding: 15px; font-family: 'Consolas', 'Courier New', monospace; font-size: 12px; color: #fff; line-height: 1.4; scroll-behavior: smooth; }
        .log-content .line { margin-bottom: 2px; }

        /* Modal Styles */
        .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal { background: var(--surface); width: 100%; max-width: 600px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.05); padding: 32px; max-height: 90vh; overflow-y: auto; }
        .modal h2 { font-family: 'Space Grotesk', sans-serif; margin-bottom: 24px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; font-weight: 600; letter-spacing: 0.5px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; padding: 12px; color: #fff; font-family: inherit; font-size: 14px; }
        .form-group input:focus { border-color: var(--primary); outline: none; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; }

        /* Utils */
        .close-btn { cursor: pointer; font-size: 20px; color: var(--text-dim); }
        .close-btn:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="brand">
                <div class="hex-logo">S</div>
                <span>Skillcade Admin</span>
            </div>
            <a href="#" class="nav-link active">Games Dashboard</a>
            <a href="#" class="nav-link" onclick="logout()">Sign Out</a>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <header>
                <h1>Game Management</h1>
                <button class="btn btn-primary" onclick="openAddModal()">+ New Game</button>
            </header>

            <div class="games-grid" id="gamesGrid">
                <!-- Cards injected here -->
            </div>
        </div>
    </div>

    <!-- Log Console -->
    <div id="logOverlay" class="log-overlay">
        <div class="log-header">
            <span id="logTitle">Game Logs</span>
            <span class="close-btn" onclick="closeLogs()">×</span>
        </div>
        <div id="logContent" class="log-content"></div>
    </div>

    <!-- Modal: Add/Edit Game -->
    <div id="gameModal" class="modal-backdrop">
        <div class="modal">
            <h2 id="modalTitle">Edit Game</h2>
            <form id="gameForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Display Name</label>
                        <input type="text" name="name" required placeholder="e.g. Bubble Blitzers">
                    </div>
                    <div class="form-group">
                        <label>Slug (URL Identifier)</label>
                        <input type="text" name="slug" required placeholder="e.g. bubble-blitzers">
                    </div>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" rows="2" placeholder="Brief game description"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>WebGL URL</label>
                        <input type="text" name="webGLUrl" placeholder="/webgl/game/index.html">
                    </div>
                    <div class="form-group">
                        <label>Replay Viewer URL</label>
                        <input type="text" name="replayViewerUrl" placeholder="/webgl/viewer/index.html">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Replay Folder Path</label>
                        <input type="text" name="replayFolderPath" placeholder="/app/gamedata/...">
                    </div>
                    <div class="form-group">
                        <label>File Extension</label>
                        <input type="text" name="fileExtension" placeholder=".replay">
                    </div>
                </div>
                
                <h3 style="font-size: 14px; margin-bottom: 20px; color: var(--primary); font-family: 'Space Grotesk'">Server Control</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Restart Type</label>
                        <select name="restartType">
                            <option value="None">None</option>
                            <option value="Systemd">Systemd</option>
                            <option value="DockerCompose">Docker Compose</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Service/Container Name</label>
                        <input type="text" name="restartServiceName" placeholder="Service ID">
                    </div>
                </div>
                <div class="form-group">
                    <label>Docker Compose Path / Script Path</label>
                    <input type="text" name="restartPath" placeholder="/home/user/docker-compose.yml">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Log Type</label>
                        <select name="logType">
                            <option value="Standard">Standard (Stdout)</option>
                            <option value="File">Internal File</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>External/Internal Log Path</label>
                        <input type="text" name="logPath" placeholder="/var/log/...">
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <button type="button" class="btn btn-secondary" id="deleteBtn" style="background: rgba(255, 110, 132, 0.1); color: var(--error); border-color: rgba(255, 110, 132, 0.2)">Delete Game</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentProjects = [];
        let logEventSource = null;

        async function fetchProjects() {
            try {
                const response = await fetch('/api/admin/projects');
                if (!response.ok) throw new Error('Unauthenticated');
                currentProjects = await response.json();
                renderGrid();
            } catch (err) {
                window.location.href = '/login.html';
            }
        }

        function renderGrid() {
            const grid = document.getElementById('gamesGrid');
            grid.innerHTML = currentProjects.map(p => `
                <div class="game-card">
                    <span class="status-badge">${p.restartType !== 'None' ? 'Managed' : 'Static'}</span>
                    <h3>${p.name}</h3>
                    <p>${p.description || 'No description provided.'}</p>
                    <div class="card-footer">
                        <button class="btn btn-secondary btn-sm" onclick="editGame('${p.slug}')">Edit Config</button>
                        ${p.restartType !== 'None' && p.restartServiceName ? `
                            <button class="btn btn-primary btn-sm" onclick="restartServer('${p.slug}')">Restart</button>
                            <button class="btn btn-secondary btn-sm" style="color: var(--tertiary)" onclick="viewLogs('${p.slug}', '${p.name}')">View Logs</button>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        function openAddModal() {
            document.getElementById('modalTitle').innerText = 'Add New Game';
            document.getElementById('gameForm').reset();
            document.getElementById('gameForm').dataset.mode = 'add';
            document.getElementById('deleteBtn').style.display = 'none';
            document.getElementById('gameModal').style.display = 'flex';
        }

        function editGame(slug) {
            const game = currentProjects.find(p => p.slug === slug);
            if (!game) return;

            document.getElementById('modalTitle').innerText = 'Edit Game Configuration';
            const form = document.getElementById('gameForm');
            form.dataset.mode = 'edit';
            form.dataset.originalSlug = slug;
            document.getElementById('deleteBtn').style.display = 'block';
            document.getElementById('deleteBtn').onclick = () => deleteGame(slug);

            // Fill form
            Object.keys(game).forEach(key => {
                if (form.elements[key]) form.elements[key].value = game[key];
            });

            document.getElementById('gameModal').style.display = 'flex';
        }

        async function saveGame(e) {
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            
            // Fix types
            data.restartType = data.restartType || 'None';
            data.logType = data.logType || 'Standard';

            const mode = form.dataset.mode;
            const url = mode === 'add' ? '/api/admin/projects' : `/api/admin/projects/${form.dataset.originalSlug}`;
            const method = mode === 'add' ? 'POST' : 'PUT';

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    closeModal();
                    fetchProjects();
                } else {
                    const msg = await res.text();
                    alert('Error: ' + msg);
                }
            } catch (err) {
                alert('Connection error');
            }
        }

        async function deleteGame(slug) {
            if (!confirm(`Are you sure you want to delete ${slug}?`)) return;
            await fetch(`/api/admin/projects/${slug}`, { method: 'DELETE' });
            closeModal();
            fetchProjects();
        }

        async function restartServer(slug) {
            if (!confirm(`Trigger restart for ${slug}?`)) return;
            const res = await fetch(`/api/admin/projects/${slug}/restart`, { method: 'POST' });
            const msg = await res.text();
            alert(res.ok ? 'Restart command sent successfully.' : 'Error: ' + msg);
        }

        function viewLogs(slug, name) {
            closeLogs(); // close existing
            document.getElementById('logTitle').innerText = `${name} | Live Logs`;
            document.getElementById('logOverlay').style.display = 'flex';
            const content = document.getElementById('logContent');
            content.innerHTML = '<div class="line" style="color: #666"><i>Connecting to stream...</i></div>';

            logEventSource = new EventSource(`/api/admin/projects/${slug}/logs`);
            logEventSource.onmessage = (e) => {
                const line = document.createElement('div');
                line.className = 'line';
                line.textContent = e.data;
                content.appendChild(line);
                content.scrollTop = content.scrollHeight;
            };
            logEventSource.onerror = () => {
                const line = document.createElement('div');
                line.className = 'line';
                line.style.color = '#ff6e84';
                line.textContent = '--- Disconnected from log stream ---';
                content.appendChild(line);
                logEventSource.close();
            };
        }

        function closeLogs() {
            if (logEventSource) {
                logEventSource.close();
                logEventSource = null;
            }
            document.getElementById('logOverlay').style.display = 'none';
        }

        function closeModal() { document.getElementById('gameModal').style.display = 'none'; }
        document.getElementById('gameForm').addEventListener('submit', saveGame);

        async function logout() {
            await fetch('/api/admin/logout', { method: 'POST' });
            window.location.href = '/login.html';
        }

        window.onclick = (e) => {
            if (e.target.classList.contains('modal-backdrop')) closeModal();
        };

        fetchProjects();
    </script>
</body>
</html>
