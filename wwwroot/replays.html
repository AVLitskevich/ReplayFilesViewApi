<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Replays — Replay Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --primary: #6366f1;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --radius: 12px;
            --transition: all 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.5;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: var(--bg-card);
            padding: 2.5rem;
            border-radius: var(--radius);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            color: var(--primary);
            text-decoration: none;
            margin-bottom: 2rem;
            font-size: 0.875rem;
            font-weight: 500;
            transition: var(--transition);
        }

        .back-link:hover {
            color: #818cf8;
            transform: translateX(-4px);
        }

        h1 {
            font-size: 1.875rem;
            font-weight: 700;
            margin-bottom: 2rem;
            letter-spacing: -0.025em;
        }

        #loading, #empty-message {
            text-align: center;
            padding: 4rem 0;
            color: var(--text-muted);
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 2px solid rgba(99, 102, 241, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #error {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            display: none;
        }

        .table-container {
            overflow-x: auto;
            display: none;
        }

        .table-container.visible {
            display: block;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        th {
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9375rem;
        }

        tbody tr:hover td {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .file-name {
            font-weight: 500;
            color: var(--text-main);
        }

        .file-size {
            color: var(--text-muted);
            font-family: monospace;
        }

        .download-btn {
            background-color: var(--primary);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.8125rem;
            font-weight: 500;
            text-decoration: none;
            display: inline-flex;
            transition: var(--transition);
        }

        .download-btn:hover {
            background-color: var(--primary-hover);
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        @media (max-width: 640px) {
            .container { padding: 1.5rem; }
            h1 { font-size: 1.5rem; }
            td, th { padding: 0.75rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">
            <svg style="width: 1.25rem; height: 1.25rem; margin-right: 0.5rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Back to projects
        </a>
        <h1 id="page-title">Replays</h1>

        <div id="loading">
            <div class="spinner"></div>
            <p>Fetching replay files...</p>
        </div>
        
        <div id="error"></div>
        <div id="empty-message" style="display: none;">No replays found for this project</div>

        <div id="table-container" class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>File Name</th>
                        <th>Size</th>
                        <th style="text-align: right;">Action</th>
                    </tr>
                </thead>
                <tbody id="replays-body">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const pathParts = window.location.pathname.split('/').filter(Boolean);
        const slug = pathParts[0];

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        async function loadReplays() {
            if (!slug) {
                hideLoading();
                showError('Unidentified project context');
                return;
            }

            try {
                const response = await fetch(`/api/projects/${encodeURIComponent(slug)}/replays`);

                if (!response.ok) {
                    if (response.status === 404) throw new Error('Project repository not found');
                    throw new Error(`Sync failed (${response.status})`);
                }

                const data = await response.json();
                hideLoading();

                if (!data.replays || data.replays.length === 0) {
                    document.getElementById('empty-message').style.display = 'block';
                    return;
                }

                displayReplays(data.replays);
            } catch (error) {
                hideLoading();
                showError(error.message);
                console.error('Data Fetch Error:', error);
            }
        }

        function displayReplays(replays) {
            const tbody = document.getElementById('replays-body');
            tbody.innerHTML = '';

            replays.forEach(replay => {
                const row = document.createElement('tr');

                const nameCell = document.createElement('td');
                nameCell.className = 'file-name';
                nameCell.textContent = replay.displayName;

                const sizeCell = document.createElement('td');
                sizeCell.className = 'file-size';
                sizeCell.textContent = formatFileSize(replay.sizeBytes);

                const actionCell = document.createElement('td');
                actionCell.style.textAlign = 'right';
                
                const downloadLink = document.createElement('a');
                downloadLink.href = `/api/projects/${encodeURIComponent(slug)}/replays/${encodeURIComponent(replay.fileName)}`;
                downloadLink.className = 'download-btn';
                downloadLink.textContent = 'Download';
                downloadLink.download = replay.fileName;

                actionCell.appendChild(downloadLink);
                row.appendChild(nameCell);
                row.appendChild(sizeCell);
                row.appendChild(actionCell);

                tbody.appendChild(row);
            });

            document.getElementById('table-container').classList.add('visible');
        }

        document.addEventListener('DOMContentLoaded', loadReplays);
    </script>
    <script src="/nav.js"></script>
</body>
</html>
