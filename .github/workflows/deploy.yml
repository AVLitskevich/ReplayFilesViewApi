name: Deploy to Remote Server

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - rariaden-hub
          - skillcade-london

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'rariaden-hub' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Publish API
        run: dotnet publish ReplayFilesViewApi.csproj -c Release -r linux-x64 --self-contained false -p:PublishSingleFile=true -o ./publish

      - name: Verify Secrets
        run: |
          if [ -z "${{ secrets.DEPLOY_PATH }}" ]; then
            echo "Error: DEPLOY_PATH secret is not set!"
            exit 1
          fi
          if [ -z "${{ secrets.ROOT_PATH }}" ]; then
            echo "Error: ROOT_PATH secret is not set!"
            exit 1
          fi

      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          source: "publish"
          target: ${{ secrets.DEPLOY_PATH }}
          rm: false # Handle cleanup in SSH for better control

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          script: |
            TARGET_DIR=${{ secrets.DEPLOY_PATH }}
            DATA_DIR=${{ secrets.ROOT_PATH }}/replay-data
            
            # Setup environment
            mkdir -p $TARGET_DIR
            echo "ROOT_PATH=${{ secrets.ROOT_PATH }}" > $TARGET_DIR/.env
            mkdir -p $DATA_DIR
            
            # Fix accidental directory issues (FORCE configuration paths to be files)
            [ -d $DATA_DIR/appsettings.json ] && { echo "[Maintenance] NUKING directory $DATA_DIR/appsettings.json and replacing with file..."; sudo rm -rf $DATA_DIR/appsettings.json; }
            [ -d $DATA_DIR/projects.json ] && { echo "[Maintenance] NUKING directory $DATA_DIR/projects.json and replacing with file..."; sudo rm -rf $DATA_DIR/projects.json; }
            
            # Initialize appsettings.json if missing
            if [ ! -f $DATA_DIR/appsettings.json ]; then
              sudo cp $TARGET_DIR/publish/appsettings.json $DATA_DIR/appsettings.json
              echo "Initialized appsettings.json"
            fi
            
            # Initialize projects.json if missing
            if [ ! -f $DATA_DIR/projects.json ]; then
              if [ -f $TARGET_DIR/publish/projects.json ]; then
                sudo cp $TARGET_DIR/publish/projects.json $DATA_DIR/projects.json
                echo "Initialized projects.json"
              else
                echo "[]" | sudo tee $DATA_DIR/projects.json > /dev/null
                echo "Created empty projects.json"
              fi
            fi
            
            # Ensure the dashboard can write to projects.json
            sudo chmod 666 $DATA_DIR/projects.json
            
            # Fix ownership (ensure container user can read/write if mounted)
            sudo chown -R $USER:$USER $DATA_DIR
            
            chmod +x $TARGET_DIR/publish/ReplayFilesViewApi
            
            # Setup Systemd Service (Manual management required)
            echo "Systemd service file is managed manually."

