name: Deploy to Remote Server

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - rariaden-hub
          - skillcade-london

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'rariaden-hub' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          source: "."
          target: "~/replay-viewer"
          rm: true

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          script: |
            echo "ROOT_PATH=${{ secrets.ROOT_PATH }}" > ~/replay-viewer/.env
            mkdir -p ${{ secrets.ROOT_PATH }}/replay-data
            if [ ! -f ${{ secrets.ROOT_PATH }}/replay-data/appsettings.json ]; then
              cp ~/replay-viewer/appsettings.json ${{ secrets.ROOT_PATH }}/replay-data/appsettings.json
              echo "Created initial appsettings.json in ${{ secrets.ROOT_PATH }}/replay-data/"
            fi
            cd ~/replay-viewer
            docker compose up -d --build --force-recreate
